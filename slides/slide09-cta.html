<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0A0A0A; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
  }
.main {
  flex: 1;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 50pt;
}
.diamond {
  margin-bottom: 20pt;
}
.gold-line {
  width: 60pt; height: 2pt;
  background: #D4AF37;
  margin-bottom: 20pt;
}
.cta-box {
  margin-top: 24pt;
  padding: 12pt 40pt;
  background: #D4AF37;
  border-radius: 4pt;
}
.contact-row {
  display: flex; gap: 30pt;
  margin-top: 28pt;
}
.contact-item {
  text-align: center;
}
.divider-v {
  width: 1pt;
  background: rgba(212, 175, 55, 0.3);
}
</style>
</head>
<body>
<div class="main">
  <img src="../assets/diamond-icon.png" style="width: 40pt; height: 40pt; margin-bottom: 20pt;">
  <div class="gold-line"></div>
  <h1 style="color: #FFFFFF; font-size: 28pt; margin: 0; text-align: center;">Ready to Add Some Sparkle?</h1>
  <p style="color: #CCCCCC; font-size: 12pt; margin: 10pt 0 0 0; text-align: center;">Let's bring your bling vision to life. Get a free design mockup today.</p>
  <div class="cta-box">
    <p style="color: #0A0A0A; font-size: 14pt; margin: 0; text-align: center;"><b>REQUEST A QUOTE</b></p>
  </div>
  <div class="contact-row">
    <div class="contact-item">
      <p style="color: #D4AF37; font-size: 10pt; margin: 0;"><b>Email</b></p>
      <p style="color: #AAAAAA; font-size: 9pt; margin: 4pt 0 0 0;">sales@miin.com</p>
    </div>
    <div class="divider-v"></div>
    <div class="contact-item">
      <p style="color: #D4AF37; font-size: 10pt; margin: 0;"><b>WhatsApp</b></p>
      <p style="color: #AAAAAA; font-size: 9pt; margin: 4pt 0 0 0;">+86 XXX XXXX XXXX</p>
    </div>
    <div class="divider-v"></div>
    <div class="contact-item">
      <p style="color: #D4AF37; font-size: 10pt; margin: 0;"><b>Website</b></p>
      <p style="color: #AAAAAA; font-size: 9pt; margin: 4pt 0 0 0;">www.miin.com</p>
    </div>
  </div>
</div>
</body>
</html>
